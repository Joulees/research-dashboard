<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Research Dashboard</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { margin: 0; }
  #root { min-height: 100vh; }
  .boot { font-family: system-ui; color: #4A586C; text-align: center; padding: 80px 20px; }
</style>
</head>
<body>
<div id="root"><div class="boot">Lade Dashboard…</div></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* ============================ DATENQUELLEN ============================
   Universum: data/companies.json (im Repo, von der App editierbar -> Download)
   Snapshot:  data/snapshot.json  (taeglich vom GitHub-Action-Skript erzeugt)
   Lokale Bearbeitungen liegen im localStorage und ueberschreiben companies.json. */
const LS_UNIVERSE = "rd-universe-override-v1";

const CAT_COLORS = { Earnings:"#2C6E6A", Conference:"#3A5BA0", Guidance:"#9C6B1E", "M&A":"#7A3E8E", Rating:"#9A3B2C", Markt:"#4A6741", Sonstiges:"#46546A" };
const EVENT_COLORS = { Earnings:"#2C6E6A", Conference:"#3A5BA0", Hauptversammlung:"#7A3E8E", "Capital Markets Day":"#9C6B1E", Sonstiges:"#46546A" };

const todayISO = () => new Date().toISOString().slice(0,10);
const fmtDate = (s) => { try { return new Date(s).toLocaleDateString("de-DE",{day:"2-digit",month:"short",year:"numeric"});} catch { return s; } };
const fmtTime = (s) => { try { return new Date(s).toLocaleString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});} catch { return "—"; } };

/* ---------- TA-Helfer (nur fuer den Chart; Kennzahlen kommen fertig aus dem Snapshot) ---------- */
function smaLine(a, n){ return a.map((_,i)=>{ const w=a.slice(Math.max(0,i-n+1),i+1); return w.length===n? w.reduce((x,y)=>x+y,0)/n : null; }); }
function MiniChart({ closes }){
  if(!closes || closes.length<2) return null;
  const W=560,H=200,pad=8;
  const s20=smaLine(closes,20), s50=smaLine(closes,50);
  const all=closes.concat(s20.filter(v=>v!=null),s50.filter(v=>v!=null));
  const min=Math.min(...all),max=Math.max(...all),span=max-min||1;
  const x=i=>pad+(i/(closes.length-1))*(W-2*pad);
  const y=v=>pad+(1-(v-min)/span)*(H-2*pad);
  const path=(arr)=>arr.map((v,i)=>v==null?null:`${i===0||arr[i-1]==null?"M":"L"}${x(i).toFixed(1)},${y(v).toFixed(1)}`).filter(Boolean).join(" ");
  const up=closes[closes.length-1]>=closes[0];
  return (
    <svg className="rd-chart" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
      <path d={path(closes)} fill="none" stroke={up?"var(--bond)":"var(--watch)"} strokeWidth="2"/>
      <path d={path(s20)} fill="none" stroke="var(--gold)" strokeWidth="1.3" strokeDasharray="4 3" opacity="0.9"/>
      <path d={path(s50)} fill="none" stroke="var(--navy)" strokeWidth="1.3" opacity="0.6"/>
    </svg>
  );
}

/* ============================ APP ============================ */
function App(){
  const [page,setPage]=useState("home");
  const [universe,setUniverse]=useState([]);
  const [snap,setSnap]=useState({companies:{},news:[],events:[],generatedAt:null});
  const [loading,setLoading]=useState(true);
  const [loadErr,setLoadErr]=useState("");
  const [fAsset,setFAsset]=useState("Alle");
  const [fStatus,setFStatus]=useState("Alle");
  const [selId,setSelId]=useState(null);

  const loadAll = useCallback(async ()=>{
    setLoading(true); setLoadErr("");
    // Universum: lokale Bearbeitung bevorzugen, sonst companies.json
    let uni=null;
    try { const ls=localStorage.getItem(LS_UNIVERSE); if(ls) uni=JSON.parse(ls); } catch {}
    if(!uni){
      try { const r=await fetch("./data/companies.json?_="+Date.now()); uni=await r.json(); } catch(e){ uni=[]; }
    }
    setUniverse(Array.isArray(uni)?uni:[]);
    try {
      const r=await fetch("./data/snapshot.json?_="+Date.now());
      if(!r.ok) throw new Error("snapshot.json fehlt ("+r.status+")");
      setSnap(await r.json());
    } catch(e){ setLoadErr("Noch kein Snapshot vorhanden. Sobald der taegliche Lauf (oder ein manueller „Run workflow“) durchgelaufen ist, erscheinen hier die Daten."); }
    setLoading(false);
  },[]);

  useEffect(()=>{ loadAll(); },[loadAll]);

  const saveUniverse=useCallback((next)=>{
    setUniverse(next);
    try { localStorage.setItem(LS_UNIVERSE, JSON.stringify(next)); } catch {}
  },[]);

  const companyById=useMemo(()=>Object.fromEntries(universe.map(c=>[c.id,c])),[universe]);
  const inFilter=(a,s)=>(fAsset==="Alle"||a===fAsset)&&(fStatus==="Alle"||s===fStatus);

  const visNews=useMemo(()=> (snap.news||[]).filter(n=>{
    const c=companyById[n.companyId]; if(!c) return false; return inFilter(c.asset,c.status);
  }),[snap,fAsset,fStatus,companyById]);

  const visEvents=useMemo(()=>{ const t=todayISO();
    return (snap.events||[]).filter(e=>{ const c=companyById[e.companyId]; const okF=c?inFilter(c.asset,c.status):true; return okF && (!e.date||e.date>=t); });
  },[snap,fAsset,fStatus,companyById]);

  const openCompany=useCallback((id)=>{ setSelId(id); setPage("company"); },[]);

  return (
    <div className="rd">
      <Style/>
      <div className="rd-top"><div className="rd-topin">
        <div className="rd-brand"><span className="k">Research Dashboard</span><span className="n">Coverage Desk</span></div>
        <nav className="rd-nav">
          <button className={page==="home"?"on":""} onClick={()=>setPage("home")}>Newsflow</button>
          <button className={page==="markets"?"on":""} onClick={()=>setPage("markets")}>Märkte</button>
          <button className={page==="company"?"on":""} onClick={()=>setPage("company")}>Unternehmen</button>
          <button className={page==="tech"?"on":""} onClick={()=>setPage("tech")}>Technik</button>
          <button className={page==="settings"?"on":""} onClick={()=>setPage("settings")}>⚙ Einstellungen</button>
        </nav>
      </div></div>

      <div className="rd-wrap">
        {page==="home" && <HomePage {...{snap,visNews,visEvents,fAsset,setFAsset,fStatus,setFStatus,loading,loadErr,loadAll,companyById,openCompany}}/>}
        {page==="markets" && <MarketsPage universe={universe} onOpen={openCompany}/>}
        {page==="company" && <CompanyDetail {...{universe,selId,setSelId,snap}}/>}
        {page==="tech" && <TechPage universe={universe} snap={snap} onOpen={openCompany}/>}
        {page==="settings" && <SettingsPage universe={universe} saveUniverse={saveUniverse} reload={loadAll}/>}
      </div>

      <div className="rd-foot">
        {universe.length} Titel im Universum · Snapshot vom {snap.generatedAt? fmtTime(snap.generatedAt):"—"} · automatischer Refresh taeglich 07:00 via GitHub Actions.
      </div>
    </div>
  );
}

/* ---------------- HOME ---------------- */
function HomePage({snap,visNews,visEvents,fAsset,setFAsset,fStatus,setFStatus,loading,loadErr,loadAll,companyById,openCompany}){
  return (
    <div className="fade">
      <div className="rd-h">
        <div>
          <h1>Newsflow & Kalender</h1>
          <p>Meldungen, Earnings, Konferenzen und IR-Termine über das gesamte Universum. Klicke eine Meldung für Details und Quelle.</p>
        </div>
        <div className="rd-tools">
          <div className="rd-segs">
            <div className="rd-seg2">{["Alle","Aktien","Anleihen"].map(a=><button key={a} className={fAsset===a?"on":""} onClick={()=>setFAsset(a)}>{a}</button>)}</div>
            <div className="rd-seg2">{["Alle","Portfolio","Watchlist"].map(s=><button key={s} className={fStatus===s?"on":""} onClick={()=>setFStatus(s)}>{s}</button>)}</div>
          </div>
          <div className="rd-refresh">
            <span className="rd-stamp">Stand: <b>{snap.generatedAt?fmtTime(snap.generatedAt):"—"}</b></span>
            <button className="rd-btn sm" onClick={loadAll} disabled={loading}>{loading?"lädt…":"↻ Neu laden"}</button>
          </div>
        </div>
      </div>

      {loadErr && <div className="rd-diag-box bad">{loadErr}</div>}

      <div className="rd-grid">
        <div>
          <div className="rd-sechead"><h2>Newsflow</h2><span className="c">{visNews.length} Einträge</span></div>
          <div className="rd-feed">
            {!loading && visNews.length===0 && <div className="rd-empty">Keine Meldungen für diese Filter im aktuellen Snapshot.</div>}
            {visNews.map(n=><NewsCard key={n.url||n.companyId+n.title+n.date} n={n} name={companyById[n.companyId]?.name||n.company} onOpen={()=>companyById[n.companyId]&&openCompany(n.companyId)}/>)}
          </div>
        </div>
        <aside>
          <div className="rd-cal">
            <h2>Event-Kalender</h2><p className="sub">Bevorstehende Termine der nächsten Monate</p>
            <CalendarBody events={visEvents}/>
          </div>
        </aside>
      </div>
    </div>
  );
}

function NewsCard({n,name,onOpen}){
  const [open,setOpen]=useState(false);
  const color=CAT_COLORS[n.category]||CAT_COLORS.Sonstiges;
  return (
    <div className="rd-news" onClick={()=>setOpen(o=>!o)}>
      <div className="row1">
        <span className="rd-cat" style={{background:color}}>{n.category}</span>
        <span className="rd-co rd-link" onClick={e=>{e.stopPropagation(); onOpen&&onOpen();}}>{name||n.company}</span>
        <span className="rd-when">{fmtDate(n.date)}</span>
      </div>
      <h3>{n.title}</h3>
      <p>{n.summary}</p>
      {open && <div className="detail">Quelle: {n.source||"—"}{n.url? <> · <a href={n.url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()}>Zur Quelle ↗</a></>:""}</div>}
    </div>
  );
}

function CalendarBody({events}){
  if(!events.length) return <div className="rd-empty" style={{padding:"28px 16px",fontSize:12.5}}>Keine bevorstehenden Events im Snapshot.</div>;
  const groups={};
  events.forEach(e=>{ const d=new Date(e.date); const key=isNaN(d)?"Demnächst":d.toLocaleDateString("de-DE",{month:"long",year:"numeric"}); (groups[key]=groups[key]||[]).push(e); });
  return (<div>{Object.entries(groups).map(([month,evs])=>(
    <div key={month}><div className="rd-month">{month}</div>
      {evs.map((e,i)=>{ const d=new Date(e.date); const color=EVENT_COLORS[e.type]||EVENT_COLORS.Sonstiges; return (
        <div className="rd-ev" key={i}>
          <div className="d"><b>{isNaN(d)?"—":d.getDate()}</b><span>{isNaN(d)?"":d.toLocaleDateString("de-DE",{weekday:"short"})}</span></div>
          <div className="body"><div className="t">{e.title}</div><div className="m"><span className="co">{e.company}</span><span className="ty" style={{background:color}}>{e.type}</span></div></div>
        </div>);})}
    </div>))}</div>);
}

/* ---------------- MAERKTE ---------------- */
function MarketsPage({universe,onOpen}){
  const [fAsset,setFAsset]=useState("Alle");
  const port=universe.filter(c=>c.status==="Portfolio"&&(fAsset==="Alle"||c.asset===fAsset));
  const groups={}; port.forEach(c=>{ const k=c.sector||"Sonstiges"; (groups[k]=groups[k]||[]).push(c); });
  const ordered=Object.entries(groups).sort((a,b)=>b[1].length-a[1].length);
  return (
    <div className="fade">
      <div className="rd-h">
        <div><h1>Märkte</h1><p>Portfolio-Titel nach Endmärkten gruppiert (ohne Wettbewerber). Klicke einen Titel für den Deep-Dive.</p></div>
        <div className="rd-tools"><div className="rd-segs"><div className="rd-seg2">{["Alle","Aktien","Anleihen"].map(a=><button key={a} className={fAsset===a?"on":""} onClick={()=>setFAsset(a)}>{a}</button>)}</div></div></div>
      </div>
      <div className="rd-mk-grid">
        {ordered.map(([sector,cos])=>(
          <div className="rd-mk-col" key={sector}>
            <div className="rd-mk-head"><span>{sector}</span><b>{cos.length}</b></div>
            {cos.map(c=>(<div className="rd-mk-card" key={c.id} onClick={()=>onOpen(c.id)}>
              <div className="nm">{c.name}</div><div className="mt">{c.markets}</div>
              <span className={"rd-tag "+(c.asset==="Anleihen"?"bond":"equity")}>{c.asset}</span>
            </div>))}
          </div>))}
        {!ordered.length && <div className="rd-empty">Keine Portfolio-Titel für diesen Filter.</div>}
      </div>
    </div>
  );
}

/* ---------------- UNTERNEHMEN ---------------- */
function CompanyDetail({universe,selId,setSelId,snap}){
  const current=universe.find(c=>c.id===selId)||universe[0];
  if(!current) return <div className="rd-empty fade">Kein Unternehmen im Universum.</div>;
  const data=(snap.companies||{})[String(current.id)]||{};
  const prof=data.profile, ta=data.tech, today=todayISO();
  const coNews=(data.news||[]).slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).slice(0,8);
  const coEvents=(data.events||[]).filter(e=>!e.date||e.date>=today).sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  const cur=ta?(ta.currency||""):"";
  const fmtP=v=>v==null?"—":`${cur} ${Number(v).toFixed(2)}`;
  return (
    <div className="fade">
      <div className="rd-h">
        <div>
          <div className="rd-dd-sel"><select value={current.id} onChange={e=>setSelId(Number(e.target.value))}>{universe.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
          <h1>{current.name}</h1>
          <div className="rd-dd-tags">
            <span className={"rd-tag "+(current.asset==="Anleihen"?"bond":"equity")}>{current.asset}</span>
            <span className={"rd-tag "+(current.status==="Watchlist"?"watch":"port")}>{current.status}</span>
            {current.sector && <span className="rd-tag sector">{current.sector}</span>}
          </div>
        </div>
      </div>
      <div className="rd-dd-grid">
        <div>
          <div className="rd-card"><h3>Geschäftsmodell</h3><p>{prof?.businessModel||"Keine Beschreibung im Snapshot. (Geschäftsmodell-Texte sind optional und werden erzeugt, wenn ein ANTHROPIC_API_KEY hinterlegt ist.)"}</p></div>
          <div className="rd-card"><h3>Abgrenzung zu Wettbewerbern</h3><p>{prof?.differentiation||"—"}</p>
            <div className="rd-dd-peers">{(current.competitors||[]).map((p,i)=><span className="rd-chip" key={i}>{p}</span>)}</div>
          </div>
          <div className="rd-card"><h3>Endmärkte</h3><p>{current.markets||"—"}</p></div>
          <div className="rd-card">
            <div className="rd-card-h"><h3>Technische Analyse</h3>{ta&&<span className={"rd-sig "+ta.label.toLowerCase()}>{ta.label}</span>}</div>
            {current.noChart? <p className="muted">Reiner Anleihe-Emittent ohne börsennotierte Aktie — keine Kurschart-Analyse.</p>
              : !ta? <p className="muted">Keine Kursdaten im Snapshot (Symbol evtl. nicht von FMP abgedeckt).</p>
              : <>
                  <MiniChart closes={ta.closes}/>
                  <div className="rd-chart-leg"><span><i style={{background:"var(--bond)"}}/>Kurs</span><span><i style={{background:"var(--gold)"}}/>SMA20</span><span><i style={{background:"var(--navy)"}}/>SMA50</span></div>
                  <div className="rd-ind">
                    <div><span>Kurs</span><b>{fmtP(ta.price)}</b></div>
                    <div><span>SMA50</span><b>{fmtP(ta.sma50)}</b></div>
                    <div><span>SMA200</span><b>{fmtP(ta.sma200)}</b></div>
                    <div><span>RSI(14)</span><b>{ta.rsi==null?"—":ta.rsi}</b></div>
                    <div><span>MACD</span><b>{ta.macd?(ta.macd==="bullisch"?"über Signal":"unter Signal"):"—"}</b></div>
                    <div><span>Spanne</span><b>{fmtP(ta.low)} – {fmtP(ta.high)}</b></div>
                  </div>
                  <div className="rd-sig-note">Regelbasiertes technisches Signal aus {ta.reasons.length} Faktoren: {ta.reasons.join(", ")}. Mechanische Lesart der Indikatoren, keine Anlageempfehlung.</div>
                </>}
          </div>
        </div>
        <aside>
          <div className="rd-card"><h3>Letzte News</h3>
            {coNews.length? coNews.map((n,i)=>(
              <div className="rd-dd-news" key={i}>
                <div className="r1"><span className="rd-cat sm" style={{background:CAT_COLORS[n.category]||CAT_COLORS.Sonstiges}}>{n.category}</span><span className="dt">{fmtDate(n.date)}</span></div>
                <div className="ti">{n.url? <a href={n.url} target="_blank" rel="noopener noreferrer">{n.title} ↗</a>:n.title}</div>
                <p>{n.summary}</p>
              </div>)) : <p className="muted">Keine Meldungen im Snapshot.</p>}
          </div>
          <div className="rd-card"><h3>Bevorstehende Events</h3>
            {coEvents.length? coEvents.map((e,i)=>(
              <div className="rd-dd-ev" key={i}><b>{fmtDate(e.date)}</b><span>{e.title}</span><span className="ty" style={{background:EVENT_COLORS[e.type]||EVENT_COLORS.Sonstiges}}>{e.type}</span></div>
            )) : <p className="muted">Keine künftigen Events im Snapshot.</p>}
          </div>
        </aside>
      </div>
    </div>
  );
}

/* ---------------- TECHNIK ---------------- */
function TechPage({universe,snap,onOpen}){
  const rows=universe.map(c=>({c,ta:(snap.companies||{})[String(c.id)]?.tech||null}));
  const order={Bullisch:0,Neutral:1,Baerisch:2};
  rows.sort((a,b)=>(a.ta?order[a.ta.label]:3)-(b.ta?order[b.ta.label]:3));
  return (
    <div className="fade">
      <div className="rd-h"><div><h1>Technische Analyse</h1><p>Indikator-Übersicht je Titel mit regelbasiertem Signal (Trend ggü. SMA50/200, MACD, RSI, Bollinger). Mechanische Lesart, keine Anlageempfehlung.</p></div></div>
      <table className="rd-tech-tbl">
        <thead><tr><th>Unternehmen</th><th>Signal</th><th>Kurs</th><th>vs SMA50</th><th>vs SMA200</th><th>RSI</th><th>MACD</th></tr></thead>
        <tbody>
          {rows.map(({c,ta})=>(
            <tr key={c.id} onClick={()=>onOpen(c.id)}>
              <td><div className="nm">{c.name}</div><span className={"rd-tag "+(c.asset==="Anleihen"?"bond":"equity")}>{c.asset}</span></td>
              <td>{ta? <span className={"rd-sig "+ta.label.toLowerCase()}>{ta.label}</span> : <span className="muted">{c.noChart?"—":"keine Daten"}</span>}</td>
              <td className="num">{ta?`${ta.currency} ${ta.price}`:"—"}</td>
              <td>{ta&&ta.sma50!=null? <span className={ta.price>=ta.sma50?"pos":"neg"}>{ta.price>=ta.sma50?"▲ darüber":"▼ darunter"}</span>:"—"}</td>
              <td>{ta&&ta.sma200!=null? <span className={ta.price>=ta.sma200?"pos":"neg"}>{ta.price>=ta.sma200?"▲ darüber":"▼ darunter"}</span>:"—"}</td>
              <td className="num">{ta&&ta.rsi!=null?ta.rsi:"—"}</td>
              <td>{ta&&ta.macd? (ta.macd==="bullisch"?<span className="pos">bullisch</span>:<span className="neg">bärisch</span>):"—"}</td>
            </tr>))}
        </tbody>
      </table>
    </div>
  );
}

/* ---------------- EINSTELLUNGEN ---------------- */
const blankCo=()=>({id:Date.now(),name:"",symbol:"",asset:"Aktien",status:"Portfolio",competitors:[],markets:"",sector:""});
function SettingsPage({universe,saveUniverse,reload}){
  const [editing,setEditing]=useState(null);
  const [isNew,setIsNew]=useState(false);
  const [q,setQ]=useState("");
  const [fAsset,setFAsset]=useState("Alle");
  const [fStatus,setFStatus]=useState("Alle");
  const filtered=universe.filter(c=>{
    if(fAsset!=="Alle"&&c.asset!==fAsset) return false;
    if(fStatus!=="Alle"&&c.status!==fStatus) return false;
    const t=q.trim().toLowerCase(); if(!t) return true;
    return (c.name+" "+(c.markets||"")+" "+(c.competitors||[]).join(" ")).toLowerCase().includes(t);
  });
  const openEdit=(c)=>{ setEditing(JSON.parse(JSON.stringify(c))); setIsNew(false); };
  const openNew=()=>{ setEditing(blankCo()); setIsNew(true); };
  const close=()=>setEditing(null);
  const save=()=>{ if(!editing.name.trim()) return; saveUniverse(isNew?[...universe,editing]:universe.map(c=>c.id===editing.id?editing:c)); close(); };
  const remove=()=>{ saveUniverse(universe.filter(c=>c.id!==editing.id)); close(); };
  const downloadJSON=()=>{
    const blob=new Blob([JSON.stringify(universe,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="companies.json"; a.click();
  };
  const resetLocal=()=>{ if(confirm("Lokale Bearbeitungen verwerfen und companies.json aus dem Repo neu laden?")){ try{localStorage.removeItem(LS_UNIVERSE);}catch{} reload(); } };
  return (
    <div className="fade">
      <div className="rd-h">
        <div><h1>Auswahl Unternehmen</h1><p>Universum verwalten: Titel anlegen, bearbeiten, entfernen. Speichern wirkt sofort lokal. Damit der tägliche Refresh die Änderung nutzt, „companies.json herunterladen“ und im Repo ersetzen.</p></div>
        <div className="rd-tools">
          <div className="rd-segs">
            <div className="rd-seg2">{["Alle","Aktien","Anleihen"].map(a=><button key={a} className={fAsset===a?"on":""} onClick={()=>setFAsset(a)}>{a}</button>)}</div>
            <div className="rd-seg2">{["Alle","Portfolio","Watchlist"].map(s=><button key={s} className={fStatus===s?"on":""} onClick={()=>setFStatus(s)}>{s}</button>)}</div>
          </div>
          <button className="rd-btn sm" onClick={openNew}>＋ Titel</button>
        </div>
      </div>
      <div className="rd-su-stats">
        <span><b>{universe.length}</b> Titel</span>
        <span><b>{universe.filter(c=>c.asset==="Aktien").length}</b> Aktien</span>
        <span><b>{universe.filter(c=>c.asset==="Anleihen").length}</b> Anleihen</span>
        <span><b>{universe.filter(c=>c.status==="Watchlist").length}</b> Watchlist</span>
        <input className="rd-su-search" placeholder="Suche…" value={q} onChange={e=>setQ(e.target.value)}/>
      </div>
      <div className="rd-su-list">
        {filtered.map(c=>(
          <div className="rd-su-row" key={c.id} onClick={()=>openEdit(c)}>
            <div className="main"><div className="nm">{c.name} {c.symbol&&<span className="sym">{c.symbol}</span>}</div>
              <div className="tags"><span className={"rd-tag "+(c.asset==="Anleihen"?"bond":"equity")}>{c.asset}</span><span className={"rd-tag "+(c.status==="Watchlist"?"watch":"port")}>{c.status}</span></div>
            </div>
            <div className="peers">{(c.competitors||[]).slice(0,5).map((p,i)=><span className="rd-chip" key={i}>{p}</span>)}{(!c.competitors||!c.competitors.length)&&<span className="muted">keine Wettbewerber</span>}</div>
            <div className="mkt">{c.markets||"—"}</div>
            <button className="rd-edit" onClick={(e)=>{e.stopPropagation();openEdit(c);}}>✎</button>
          </div>))}
        {!filtered.length && <div className="rd-empty">Keine Treffer.</div>}
      </div>
      <div className="rd-su-foot">
        <span>{filtered.length} von {universe.length} Titeln · Bearbeitungen liegen lokal im Browser.</span>
        <span style={{display:"flex",gap:10}}>
          <button className="rd-btn sm ghost" onClick={resetLocal}>↺ Aus Repo neu laden</button>
          <button className="rd-btn sm" onClick={downloadJSON}>↓ companies.json herunterladen</button>
        </span>
      </div>
      {editing && <EditPanel editing={editing} setEditing={setEditing} isNew={isNew} onSave={save} onDelete={remove} onClose={close}/>}
    </div>
  );
}

function EditPanel({editing,setEditing,isNew,onSave,onDelete,onClose}){
  const [cInput,setCInput]=useState("");
  const set=(k,v)=>setEditing(e=>({...e,[k]:v}));
  const addComp=()=>{ const v=cInput.trim(); if(!v) return; set("competitors",[...editing.competitors,v]); setCInput(""); };
  const over=editing.competitors.length>5;
  return (
    <div className="rd-ov" onMouseDown={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="rd-panel">
        <h2>{isNew?"Titel hinzufügen":"Titel bearbeiten"}</h2>
        <div className="rd-field"><label>Unternehmen</label><input value={editing.name} autoFocus onChange={e=>set("name",e.target.value)} placeholder="z. B. Metro Bank"/></div>
        <div className="rd-field"><label>FMP-Ticker-Symbol (für Kurse/News)</label><input value={editing.symbol||""} onChange={e=>set("symbol",e.target.value)} placeholder="z. B. MTRO.L, AMZN, MIN.AX — leer = keine Marktdaten"/></div>
        <div className="rd-field"><label>Relevant für</label><div className="rd-seg">{["Aktien","Anleihen"].map(a=><button key={a} className={editing.asset===a?"on":""} onClick={()=>set("asset",a)}>{a}</button>)}</div></div>
        <div className="rd-field"><label>Portfolio oder Watchlist</label><div className="rd-seg">{["Portfolio","Watchlist"].map(s=><button key={s} className={editing.status===s?"on":""} onClick={()=>set("status",s)}>{s}</button>)}</div></div>
        <div className="rd-field">
          <label>Wichtigste Wettbewerber (max. 5)</label>
          <div className="rd-cwrap">{editing.competitors.map((c,i)=><span className="rd-cchip" key={i}>{c}<button onClick={()=>set("competitors",editing.competitors.filter((_,j)=>j!==i))}>×</button></span>)}</div>
          <div className="rd-cadd"><input value={cInput} onChange={e=>setCInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addComp();}}} placeholder="Wettbewerber + Enter"/><button className="rd-btn ghost sm" onClick={addComp}>＋</button></div>
          <div className={"rd-hint"+(over?" warn":"")}>{editing.competitors.length}/5 erfasst{over?" — empfohlen sind höchstens 5.":"."}</div>
        </div>
        <div className="rd-field"><label>Endmärkte</label><textarea value={editing.markets} onChange={e=>set("markets",e.target.value)} placeholder="Sektoren / Kundengruppen / Geografien."/></div>
        <div className="rd-field"><label>Sektor / Markt (für die Märkte-Seite)</label><input value={editing.sector||""} onChange={e=>set("sector",e.target.value)} placeholder="z. B. Banken, Software, Energie"/></div>
        <div className="rd-actions">
          {!isNew && <button className="rd-del" onClick={()=>{if(confirm(`"${editing.name}" löschen?`))onDelete();}}>Löschen</button>}
          <button className="rd-btn ghost" onClick={onClose}>Abbrechen</button>
          <button className="rd-btn" onClick={onSave}>Speichern</button>
        </div>
      </div>
    </div>
  );
}
